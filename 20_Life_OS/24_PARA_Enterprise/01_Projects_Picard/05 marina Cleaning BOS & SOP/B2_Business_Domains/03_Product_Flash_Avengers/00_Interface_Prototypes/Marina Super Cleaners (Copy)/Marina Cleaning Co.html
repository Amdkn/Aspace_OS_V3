<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

/* ---------- Lucide icon helper ---------- */
function Icon({ name, className = "", size = 20, strokeWidth = 1.75 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = "";
      const svg = window.lucide.createElement(window.lucide.icons[name] || window.lucide.icons.Circle);
      svg.setAttribute("width", size);
      svg.setAttribute("height", size);
      svg.setAttribute("stroke-width", strokeWidth);
      ref.current.appendChild(svg);
    }
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={"inline-flex items-center justify-center " + className} aria-hidden="true" />;
}

/* ---------- Header ---------- */

  const [scrolled, setScrolled] = useState(false);

    const onScroll = () => setScrolled(window.scrollY > 12);
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return (
    <header className={"sticky top-0 z-50 transition-all " + (scrolled ? "header-blur border-b border-stone-200/70" : "")}>

        </a>

        <nav className="hidden md:flex items-center gap-8 text-[14px] text-stone-700">

  );
}

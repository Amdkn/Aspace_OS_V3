<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ABC OS — Le système d'exploitation des coopératives africaines</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  :root{
    --bg:#0c0b0a; --bg-2:#121110; --card:#181614; --line: rgba(245,242,235,0.08);
    --text:#f5f2eb; --mute:#a89c8a; --dim:#6b6258;
    --green:#10b981; --terracotta:#e15f41; --terracotta-deep:#d95436;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background: var(--bg); color: var(--text);
    font-family: 'Manrope', -apple-system, sans-serif; -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  ::selection{ background: var(--terracotta); color:#fff; }
  .font-serif{ font-family: 'Instrument Serif', serif; font-weight:400; }
  .scrollbar-hide::-webkit-scrollbar{ display:none; }
  .scrollbar-hide{ -ms-overflow-style:none; scrollbar-width:none; }

  /* Same textures as the app */
  .tex-field{
    background:
      radial-gradient(120% 60% at 50% 110%, rgba(0,0,0,0.55), transparent 70%),
      repeating-linear-gradient(110deg, rgba(0,0,0,0.18) 0 1px, transparent 1px 6px),
      linear-gradient(180deg, #1f3a2b 0%, #2c5a3a 38%, #3d7a47 70%, #5a9a4f 100%);
  }
  .tex-solar{
    background:
      linear-gradient(180deg, rgba(0,0,0,0.0) 55%, rgba(0,0,0,0.5) 100%),
      repeating-linear-gradient(70deg, #0d2538 0 14px, #163654 14px 15px, #0d2538 15px 28px),
      linear-gradient(180deg, #2a5e88 0%, #1a3f5b 60%, #0a2030 100%);
  }
  .tex-weave{
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0 2px, transparent 2px 7px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 8px),
      linear-gradient(135deg, #7a3d22 0%, #b15a32 50%, #d9824a 100%);
  }
  .tex-garden{
    background:
      radial-gradient(60% 70% at 30% 80%, rgba(0,0,0,0.5), transparent 70%),
      repeating-linear-gradient(45deg, rgba(0,0,0,0.15) 0 2px, transparent 2px 9px),
      linear-gradient(160deg, #2d4a1f 0%, #4d7a36 55%, #8baf5a 100%);
  }
  .tex-loom{
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.22) 0 1px, transparent 1px 5px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 6px),
      linear-gradient(135deg, #5c2a18 0%, #8a3e22 60%, #d4824a 100%);
  }

  /* Subtle grid + sun glow on body */
  .horizon{
    position:absolute; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(1200px 700px at 80% 15%, rgba(225,95,65,0.22), transparent 60%),
      radial-gradient(900px 700px at 12% 60%, rgba(16,185,129,0.10), transparent 60%),
      radial-gradient(800px 500px at 50% 100%, rgba(225,95,65,0.06), transparent 60%);
  }
  .grain{
    position:absolute; inset:0; pointer-events:none; z-index:1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.96  0 0 0 0 0.95  0 0 0 0 0.92  0 0 0 0.05 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity:0.5; mix-blend-mode:overlay;
  }

  /* Animations */
  @keyframes fadeUp { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform:none; } }
  .anim-fade-up{ animation: fadeUp .8s ease-out both; }
  @keyframes float { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-6px); } }
  .anim-float{ animation: float 6s ease-in-out infinite; }
  @keyframes pulseDot { 0%,100%{ opacity:0.4; } 50%{ opacity:1; } }
  .anim-pulse-dot{ animation: pulseDot 1.8s ease-in-out infinite; }
  @keyframes pulseGlow { 0%,100%{ box-shadow: 0 0 0 0 rgba(225,95,65,0.45);} 50%{ box-shadow: 0 0 0 16px rgba(225,95,65,0);} }
  .anim-pulse-btn{ animation: pulseGlow 2.4s ease-out infinite; }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .anim-marquee{ animation: marquee 35s linear infinite; }

  /* Reuse some app screen styles */
  .abc-screen{ font-family: 'Manrope', sans-serif; }
  .tab-underline{ position:relative; }
  .tab-underline.active::after{ content:''; position:absolute; left:8px; right:8px; bottom:-9px; height:2px; border-radius:2px; background:#e15f41; }
  @keyframes pulseGlowApp { 0%,100%{ box-shadow: 0 0 0 0 rgba(225,95,65,0.45);} 50%{ box-shadow: 0 0 0 14px rgba(225,95,65,0);} }
  .anim-pulse{ animation: pulseGlowApp 2.2s ease-out infinite; }
  @keyframes fadeUpApp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
  .anim-fade-up{ animation: fadeUpApp .35s ease-out both; }

  /* Section underline */
  .eyebrow{
    display:inline-flex; align-items:center; gap:10px;
    font-size:11px; letter-spacing:0.28em; text-transform:uppercase;
    color: var(--terracotta); font-weight:700;
  }
  .eyebrow::before{ content:''; width:28px; height:1px; background: var(--terracotta); }

  .display{
    font-family:'Instrument Serif', serif; font-weight:400; letter-spacing:-0.01em;
  }
  .ital{ font-style: italic; }

  /* Sticky nav glass */
  .topnav{
    position: sticky; top: 14px; z-index: 50;
    background: rgba(18,17,16,0.65);
    border: 1px solid rgba(245,242,235,0.06);
    backdrop-filter: blur(18px) saturate(1.4);
    -webkit-backdrop-filter: blur(18px) saturate(1.4);
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="abc/icons.jsx"></script>
<script type="text/babel" src="abc/screens.jsx"></script>
<script type="text/babel" src="landing/landing.jsx"></script>
</body>
</html>

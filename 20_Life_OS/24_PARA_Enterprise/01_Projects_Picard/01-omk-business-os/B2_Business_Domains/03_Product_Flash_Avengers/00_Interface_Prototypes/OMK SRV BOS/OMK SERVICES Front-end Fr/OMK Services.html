<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OMK Services — Empowering Small Business Owners</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
        colors: {
          ink: {
            950: '#05060A',
            900: '#0A0B12',
            800: '#11131C',
            700: '#1A1D2A',
          }
        },
        keyframes: {
          drift: {
            '0%,100%': { transform: 'translate3d(0,0,0) scale(1)' },
            '50%':     { transform: 'translate3d(2%,-3%,0) scale(1.08)' },
          },
          driftSlow: {
            '0%,100%': { transform: 'translate3d(0,0,0) scale(1)' },
            '50%':     { transform: 'translate3d(-3%,2%,0) scale(1.05)' },
          },
          shimmer: {
            '0%':   { backgroundPosition: '-200% 0' },
            '100%': { backgroundPosition: '200% 0' },
          },
          pulseDot: {
            '0%,100%': { opacity: 1, transform: 'scale(1)' },
            '50%':     { opacity: 0.4, transform: 'scale(0.85)' },
          },
          rise: {
            '0%':   { opacity: 0, transform: 'translateY(8px)' },
            '100%': { opacity: 1, transform: 'translateY(0)' },
          },
          ticker: {
            '0%':   { transform: 'translateY(0)' },
            '20%':  { transform: 'translateY(0)' },
            '25%':  { transform: 'translateY(-100%)' },
            '45%':  { transform: 'translateY(-100%)' },
            '50%':  { transform: 'translateY(-200%)' },
            '70%':  { transform: 'translateY(-200%)' },
            '75%':  { transform: 'translateY(-300%)' },
            '95%':  { transform: 'translateY(-300%)' },
            '100%': { transform: 'translateY(-400%)' },
          }
        },
        animation: {
          drift:     'drift 18s ease-in-out infinite',
          driftSlow: 'driftSlow 24s ease-in-out infinite',
          shimmer:   'shimmer 3.5s linear infinite',
          pulseDot:  'pulseDot 1.8s ease-in-out infinite',
          rise:      'rise 0.6s ease-out both',
          ticker:    'ticker 9s cubic-bezier(0.7,0,0.3,1) infinite',
        }
      }
    }
  }
</script>

<style>
  html, body { background: #05060A; color: #E7E9EE; }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'Space Grotesk', system-ui, sans-serif; letter-spacing: -0.02em; }

  /* Subtle grid backdrop */
  .grid-bg {
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 56px 56px;
  }
  .grid-bg-fade {
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, #000 40%, transparent 75%);
            mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, #000 40%, transparent 75%);
  }

  /* Mesh blobs */
  .blob { position: absolute; border-radius: 9999px; filter: blur(80px); opacity: 0.55; pointer-events: none; will-change: transform; }

  /* Gradient text */
  .text-mesh {
    background: linear-gradient(100deg, #C7D2FE 0%, #818CF8 25%, #A78BFA 50%, #F472B6 80%, #FDA4AF 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  /* Buttons */
  .btn-mesh {
    position: relative; isolation: isolate; overflow: hidden;
    background: linear-gradient(120deg, #3B82F6 0%, #8B5CF6 50%, #EC4899 100%);
    background-size: 200% 100%;
    box-shadow: 0 10px 40px -10px rgba(139,92,246,0.55), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .btn-mesh::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
    transform: translateX(-100%); transition: transform 0.7s ease;
  }
  .btn-mesh:hover::after { transform: translateX(100%); }

  /* Glass card */
  .glass {
    background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .glass-hover { transition: transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease, background 0.35s ease; }
  .glass-hover:hover {
    transform: translateY(-4px);
    border-color: rgba(167,139,250,0.45);
    box-shadow: 0 30px 60px -30px rgba(139,92,246,0.5), 0 0 0 1px rgba(167,139,250,0.15);
    background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, rgba(139,92,246,0.04) 100%);
  }

  /* Gradient border (for premium cards) */
  .grad-border { position: relative; }
  .grad-border::before {
    content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
    background: linear-gradient(135deg, rgba(59,130,246,0.6), rgba(139,92,246,0.4), rgba(236,72,153,0.6));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
  }

  /* Spotlight follow effect (handled by JS) */
  .spot { position: relative; overflow: hidden; }
  .spot::before {
    content: ''; position: absolute; inset: -1px; border-radius: inherit; pointer-events: none;
    background: radial-gradient(280px circle at var(--mx, 50%) var(--my, 50%), rgba(139,92,246,0.18), transparent 60%);
    opacity: 0; transition: opacity 0.3s ease;
  }
  .spot:hover::before { opacity: 1; }

  /* Marquee */
  .marquee { mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent); }
  @keyframes scrollX { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee-track { animation: scrollX 32s linear infinite; }

  /* Waveform bars for Nova */
  @keyframes wave {
    0%,100% { transform: scaleY(0.3); }
    50%     { transform: scaleY(1); }
  }
  .wave-bar { animation: wave 1.1s ease-in-out infinite; transform-origin: center; }

  /* Hide scrollbar in horizontal scrollers if any */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  /* Selection */
  ::selection { background: rgba(139,92,246,0.4); color: #fff; }

  /* Reveal on scroll */
  .reveal { opacity: 0; transform: translateY(14px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.in { opacity: 1; transform: none; }
</style>
</head>
<body class="bg-ink-950 text-slate-200">

<div id="app"></div>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="omk-app.jsx"></script>

</body>
</html>

const { useState, useEffect, useRef, useMemo } = React;

/* ─────────────────────────────────────────────
   Icon helper — render lucide SVGs by name
   ───────────────────────────────────────────── */
function Icon({ name, className = "", size = 18, strokeWidth = 1.5 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide && window.lucide.icons) {
      // empty container first
      ref.current.innerHTML = "";
      const iconName = name; // PascalCase
      const node = window.lucide.createElement(window.lucide.icons[iconName]);
      if (node) {
        node.setAttribute("width", size);
        node.setAttribute("height", size);
        node.setAttribute("stroke-width", strokeWidth);
        node.setAttribute("class", className);
        ref.current.appendChild(node);
      }
    }
  }, [name, className, size, strokeWidth]);
  return <span ref={ref} className="inline-flex" aria-hidden="true" />;
}

/* ─────────────────────────────────────────────
   Top utility bar
   ───────────────────────────────────────────── */
function TopBar() {
  const [time, setTime] = useState("");
  useEffect(() => {
    const tick = () => {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      setTime(`${hh}:${mm}:${ss} EST`);
    };
    tick();
    const i = setInterval(tick, 1000);
    return () => clearInterval(i);
  }, []);

  return (
    <div className="border-b border-slate-800/70 bg-[#020617]/80 backdrop-blur-sm relative z-30">
      <div className="max-w-[1400px] mx-auto px-6 lg:px-10 py-2 flex items-center justify-between text-[11px] uppercase tracking-[0.18em] text-slate-500 font-mono">

}

/* ─────────────────────────────────────────────
   StitchWidget — Case Number Audit Input
   ───────────────────────────────────────────── */
function StitchWidget() {
  const [val, setVal] = useState("");
  const [state, setState] = useState("idle"); // idle, validating, found, notfound, invalid
  const [progress, setProgress] = useState(0);

  // Hamilton County case format: Letter + space + digits, e.g. A 2403702
  const formatCase = (raw) => {
    const cleaned = raw.toUpperCase().replace(/[^A-Z0-9]/g, "");
    if (!cleaned) return "";
    const letter = cleaned.charAt(0);
    const digits = cleaned.slice(1).replace(/\D/g, "").slice(0, 7);
    return digits ? `${letter} ${digits}` : letter;
  };

  const onChange = (e) => {
    const formatted = formatCase(e.target.value);
    setVal(formatted);
    if (state !== "idle") setState("idle");
  };

  const onSubmit = (e) => {
    e.preventDefault();
    const m = val.match(/^[A-Z]\s\d{7}$/);
    if (!m) { setState("invalid"); return; }
    setState("validating");
    setProgress(0);
    const start = Date.now();
    const duration = 2400;
    const i = setInterval(() => {
      const p = Math.min(100, ((Date.now() - start) / duration) * 100);
      setProgress(p);
      if (p >= 100) {
        clearInterval(i);
        // Determine outcome from case number — deterministic mock
        const num = parseInt(val.slice(2), 10);
        if (num % 7 === 3) setState("notfound");
        else setState("found");
      }
    }, 40);
  };

  const reset = () => { setState("idle"); setVal(""); setProgress(0); };

  // mock surplus amount derived from input
  const surplus = useMemo(() => {
    if (state !== "found") return null;
    const num = parseInt(val.slice(2), 10) || 0;
    const base = 12000 + (num % 97) * 873;
    return base;
  }, [state, val]);

  return (
    <div className={`relative border bg-gradient-to-br from-slate-900/70 to-slate-950/90 backdrop-blur-sm rounded-sm transition-all duration-300 ${
      state === "found" ? "border-emerald-500/60 emerald-glow-strong"
      : state === "validating" ? "border-emerald-500/40"
      : state === "invalid" || state === "notfound" ? "border-rose-500/40"
      : "border-slate-800 hover:border-slate-700"
    }`}>

      <div className="flex items-center justify-between px-5 pt-4 pb-2 border-b border-slate-800/70">
        <div className="flex items-center gap-2 text-[11px] uppercase tracking-[0.2em] font-mono text-slate-500">
          <Icon name="ScanLine" size={13} className="text-emerald-500" />
          <span>Module d'Audit Sécurisé</span>
        </div>
        <div className="text-[10px] font-mono text-slate-600 uppercase tracking-widest">v2.6 · SHA-256</div>
      </div>

      <form onSubmit={onSubmit} className="p-5">
        <label className="block text-[11px] uppercase tracking-[0.2em] text-slate-500 font-mono mb-3">
          Numéro de dossier — Hamilton County Common Pleas
        </label>
        <div className="flex flex-col sm:flex-row gap-3">
          <div className="flex-1 relative">
            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 font-mono text-[13px]">
              <Icon name="Search" size={16} />
            </span>
            <input
              type="text"
              value={val}
              onChange={onChange}
              disabled={state === "validating"}
              placeholder="A 2403702"
              autoComplete="off"
              spellCheck="false"
              className="w-full bg-slate-950/80 border border-slate-800 hover:border-slate-700 focus-emerald rounded-sm pl-11 pr-4 py-3.5 text-[17px] font-mono tracking-wider text-white placeholder-slate-700 transition-all"
            />
            {val && state === "idle" && (
              <button type="button" onClick={() => setVal("")}
                      className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 hover:text-slate-400">
                <Icon name="X" size={14} />
              </button>
            )}
          </div>
          <button
            type="submit"
            disabled={state === "validating" || !val}
            className="group inline-flex items-center justify-center gap-2 px-6 py-3.5 bg-emerald-500 hover:bg-emerald-400 disabled:bg-slate-800 disabled:text-slate-600 disabled:cursor-not-allowed text-slate-950 font-semibold text-[13px] uppercase tracking-[0.14em] rounded-sm transition-all emerald-glow-strong disabled:shadow-none">
            {state === "validating" ? (
              <>
                <Icon name="Loader" size={15} className="animate-spin" />
                <span>Audit...</span>
              </>
            ) : (
              <>
                <Icon name="ShieldCheck" size={15} />
                <span>Lancer l'Audit</span>
              </>
            )}
          </button>
        </div>

        {/* Progress / result tray */}
        <div className="mt-4 min-h-[28px] text-[12px] font-mono">
          {state === "idle" && (
            <div className="flex items-center justify-between text-slate-500">
              <span className="flex items-center gap-2">
                <Icon name="Info" size={12} />
                Format Ohio: 1 lettre + 7 chiffres (ex. <span className="text-slate-300">A 2403702</span>)
              </span>
              <button type="button" onClick={() => { setVal("A 2403702"); setState("idle"); }}
                      className="text-emerald-500/80 hover:text-emerald-400 uppercase tracking-[0.18em] text-[10px]">
                ↳ Exemple
              </button>
            </div>
          )}

          {state === "validating" && (
            <div>
              <div className="flex justify-between text-slate-400 text-[11px] uppercase tracking-[0.18em]">
                <span>Connexion au Clerk of Courts…</span>
                <span className="text-emerald-400">{Math.floor(progress)}%</span>
              </div>
              <div className="mt-2 h-[2px] w-full bg-slate-800 rounded-full overflow-hidden">
                <div className="h-full bg-emerald-500 transition-all" style={{ width: `${progress}%` }}></div>
              </div>
              <div className="mt-2 text-slate-600 text-[10.5px] uppercase tracking-[0.22em] flex gap-4 flex-wrap">
                <span className={progress > 20 ? "text-emerald-500" : ""}>● Localisation</span>
                <span className={progress > 50 ? "text-emerald-500" : ""}>● Vérification fonds</span>
                <span className={progress > 80 ? "text-emerald-500" : ""}>● Audit légal</span>
              </div>
            </div>
          )}

          {state === "invalid" && (
            <div className="flex items-center justify-between gap-2 text-rose-400">
              <span className="flex items-center gap-2"><Icon name="AlertCircle" size={13} /> Format invalide — utilisez 1 lettre suivie de 7 chiffres.</span>
              <button type="button" onClick={reset} className="text-slate-500 hover:text-slate-300 text-[10px] uppercase tracking-[0.18em]">Réessayer</button>
            </div>
          )}

          {state === "notfound" && (
            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 text-rose-300/90">
              <span className="flex items-center gap-2"><Icon name="FileX" size={13} /> Aucun fonds excédentaire détecté pour <span className="text-white">{val}</span>.</span>
              <button type="button" onClick={reset} className="text-emerald-500/80 hover:text-emerald-400 text-[10px] uppercase tracking-[0.18em]">↳ Nouveau dossier</button>
            </div>
          )}

          {state === "found" && (
            <div className="border border-emerald-500/40 bg-emerald-500/[0.06] rounded-sm p-4 mt-1">
              <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                <div>
                  <div className="flex items-center gap-2 text-emerald-400 uppercase tracking-[0.2em] text-[10.5px]">
                    <Icon name="CheckCircle2" size={13} /> Fonds détectés &middot; Dossier {val}
                  </div>
                  <div className="mt-2 flex items-baseline gap-2">
                    <span className="font-display text-[34px] text-white tracking-tight">
                      ${surplus.toLocaleString('en-US')}
                    </span>
                    <span className="text-[11px] text-slate-400 uppercase tracking-[0.18em]">excédent vérifié</span>
                  </div>
                  <div className="mt-1 text-[11px] text-slate-500">
                    Détenu par le Clerk of Courts &middot; Statut : <span className="text-cream" style={{color:'var(--cream)'}}>Réclamable</span>
                  </div>
                </div>
                <button type="button"
                        className="inline-flex items-center justify-center gap-2 px-5 py-3 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-semibold text-[12px] uppercase tracking-[0.14em] rounded-sm whitespace-nowrap">
                  <span>Mandater le cabinet</span>
                  <Icon name="ArrowRight" size={14} />
                </button>
              </div>
            </div>
          )}
        </div>
      </form>
    </div>
  );
}

function AuthorityPanel() {
  return (
    <div className="relative border border-slate-800 bg-slate-950/60 backdrop-blur-sm rounded-sm overflow-hidden">
      {/* Header band */}
      <div className="border-b border-slate-800 px-5 py-3 flex items-center justify-between bg-slate-900/40">
        <div className="flex items-center gap-2 text-[10.5px] uppercase tracking-[0.22em] font-mono text-slate-400">
          <Icon name="Landmark" size={13} className="text-emerald-500" />
          <span>Cabinet · Bilan public 2024</span>
        </div>
        <span className="text-[10px] text-emerald-400/80 font-mono uppercase tracking-[0.2em] flex items-center gap-1.5">
          <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full pulse-dot"></span>
          Live

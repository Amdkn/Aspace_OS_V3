<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ABC OS — Build Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@1,9..144,500;1,9..144,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<link rel="stylesheet" href="../assets/abc-os.css" />
<link rel="stylesheet" href="../assets/hub.css" />
</head>
<body data-hub="build">
<div class="stage grain">
  <div class="phone" data-screen-label="Build Hub">
    <div class="screen">
      <div class="notch"></div>
      <div class="statusbar">
        <span>9:41</span>
        <span class="icons"><span class="material-symbols-outlined">signal_cellular_alt</span><span class="material-symbols-outlined">wifi</span><span class="material-symbols-outlined">battery_full</span></span>
      </div>
      <div class="scroll noscroll" id="scroll"></div>
      <button class="fab" aria-label="Action rapide"><span class="material-symbols-outlined">add</span></button>
      <nav class="nav" id="nav" aria-label="Navigation principale"></nav>
    </div>
  </div>
</div>
<script src="../assets/hub.js"></script>
</body>
</html>

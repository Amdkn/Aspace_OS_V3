<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategy Session — W4 (2026-07-07)</title>
<style>
  :root { --bg:#0A0E16; --panel:#111827; --gold:#C8A55C; --txt:#E5E7EB; --dim:#9CA3AF; --red:#EF4444; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--txt); font-family:Georgia,serif; line-height:1.6; padding:2rem 1rem; }
  .wrap { max-width:720px; margin:0 auto; }
  h1 { color:var(--gold); font-size:1.6rem; letter-spacing:.05em; border-bottom:1px solid var(--gold); padding-bottom:.6rem; margin-bottom:.4rem; }
  .sub { color:var(--dim); font-size:.9rem; margin-bottom:2rem; }
  .q { background:var(--panel); border-left:3px solid var(--gold); padding:1.1rem 1.3rem; margin-bottom:1.2rem; border-radius:0 8px 8px 0; }
  .q label.main { display:block; font-size:1.02rem; margin-bottom:.7rem; }
  .zone-tag { display:inline-block; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); border:1px solid var(--gold); padding:.1rem .5rem; border-radius:3px; margin-bottom:.5rem; }
  input[type=range] { width:100%; accent-color:var(--gold); }
  .sval { color:var(--gold); font-weight:bold; font-size:1.1rem; }
  .opt { display:block; margin:.4rem 0; cursor:pointer; color:var(--dim); }
  .opt input { accent-color:var(--gold); margin-right:.5rem; }
  textarea { width:100%; min-height:80px; background:#0D1220; color:var(--txt); border:1px solid #374151; border-radius:6px; padding:.7rem; font-family:inherit; font-size:.95rem; }
  button { background:var(--gold); color:#0A0E16; border:none; font-family:inherit; font-size:1.05rem; font-weight:bold; padding:.9rem 1.6rem; border-radius:6px; cursor:pointer; margin:1.5rem .5rem 0 0; }
  button.ghost { background:transparent; color:var(--gold); border:1px solid var(--gold); }
  #report { display:none; white-space:pre-wrap; background:var(--panel); border:1px solid var(--gold); border-radius:8px; padding:1.5rem; margin-top:2rem; font-family:'Courier New',monospace; font-size:.9rem; }
  @media print { body { background:#fff; color:#000; } .q, button { display:none; } #report { display:block !important; border-color:#000; color:#000; background:#fff; } }
</style></head><body><div class="wrap">
<h1>⚔ STRATEGY SESSION — W4</h1>
<div class="sub">2026-07-07 · Questions ancrées sur les faits mesurés de la semaine. Réponds vite, corrige rien.</div>
<div id="form"></div>
<button onclick="genReport()">Générer le rapport</button>
<button class="ghost" onclick="copyReport()">Copier</button>
<button class="ghost" onclick="window.print()">Imprimer</button>
<div id="report"></div>
<script>
const CFG = {"date": "2026-07-07", "week": "W4", "zones": {"client": "Exécution client", "finance": "Discipline financière", "meta": "Sobriété méta", "cadence": "Cadence 12WY"}, "blunt_lines": {"client": "Tu as 5 vidéos publiées (Journal de Bord, A0 VERSE) qui documentent exactement ce que ton Coach AI vend — et zéro CTA, zéro DM, zéro offre attachée. Le marché ne peut pas acheter ce qu'on ne lui propose pas. Le contenu existe ; c'est le courage du prix qui manque.", "finance": "Trois prix flottent dans ton canon depuis 10 jours parce que choisir un prix, c'est accepter qu'un humain réel dise non. Le pricing tri-céphale n'est pas un problème de spec — c'est une esquive.", "meta": "La semaine W3 a produit 57 handoffs et 0 signal marché. Le moratoire était le test : s'il a sauté pour autre chose qu'un ordre A+ direct, l'outillage a encore gagné. Gwyn mesurerait D11 = 0.", "cadence": "19 ADR PROPOSED et 15 GOs ouverts : ta machine décide plus vite que toi. Chaque décision non prise cette semaine en re-coûtera trois la semaine prochaine — c'est la dette qui a déjà mangé W2 et W3."}, "moves": {"client": ["Attacher UNE offre coaching (1 prix, 1 CTA) à la vidéo S02E01 'A0 VERSE — Trillion ou Rien' et l'envoyer à 3 humains réels avant vendredi.", "Republier 1 clip des 5 mp4 existants avec le lien de l'offre — zéro production nouvelle, uniquement de l'existant.", "Bloquer 2 créneaux de 1h dans calendar.md étiquetés MARCHÉ — conversation, DM ou call, rien d'autre ne compte dans ces heures."], "finance": ["Trancher le pricing en 1 phrase écrite ($1000 coaching OU tier ADR-AAAS-PRICING-001) et l'inscrire dans le plan L2 — décision datée, plus jamais rouverte cette semaine.", "Publier ce prix sur 1 surface vivante (landing Nexus ou vidéo) dans les 48h après l'avoir tranché.", "Demander à 1 prospect réel une réaction au prix — le marché calibre mieux que 3 ADRs."], "meta": ["Fermer 5 des 15 GOs ouverts en une seule passe de ratification lundi (Option A/B pré-formatées, 30 min max).", "Ratifier ou tuer 5 des 19 ADR PROPOSED — un PROPOSED de plus de 30 jours est un NO déguisé.", "Ratio 50/50 : pour chaque heure harness cette semaine, 1 heure marché tracée — l'agent te la réclame à chaque session."], "cadence": ["Réactiver LE cron choisi (un seul, GO Posture C) et vérifier qu'il a tourné 2 fois avant vendredi.", "Clarifier 3 des 9 items 12WY flous en Definition of Done d'une ligne chacun.", "Lundi : re-répondre à la Strategy Session W5 — la cadence de mesure EST la discipline."]}, "questions": [{"id": "q1", "zone": "client", "type": "slider", "max": 10, "label": "Conversations prospect RÉELLES cette semaine (humain vivant, pas un handoff) — W3 en comptait 0 pour 18 handoffs. Combien cette semaine ?"}, {"id": "q2", "zone": "client", "type": "radio", "label": "Les 5 vidéos publiées découvertes dans ton Takeout (Journal de Bord S01, Friday Report, S02E01 A0 VERSE) — qu'en as-tu fait cette semaine ?", "options": [{"label": "Rien — elles dorment toujours dans le zip", "score": 0}, {"label": "Revues / re-clippées, mais sans offre attachée", "score": 5}, {"label": "Au moins une porte une offre coaching avec prix + CTA", "score": 10}]}, {"id": "q3", "zone": "client", "type": "slider", "max": 10, "label": "Ratio réel marché/harness du move #1 de W3 (0 = 100% harness, 5 = le 50/50 promis, 10 = 100% marché) :"}, {"id": "q4", "zone": "finance", "type": "radio", "label": "Le pricing tri-céphale ($1000 / $7.5-25K / ADR-AAAS-PRICING-001) — tranché ?", "options": [{"label": "Toujours 3 prix dans le canon", "score": 0}, {"label": "Choisi et écrit, mais publié nulle part", "score": 5}, {"label": "UN prix publié sur une surface qu'un prospect peut voir", "score": 10}]}, {"id": "q5", "zone": "finance", "type": "slider", "max": 10, "label": "Discipline dépenses/subscriptions cette semaine (W3 : 9/10 — tenir, pas régresser) :"}, {"id": "q6", "zone": "meta", "type": "radio", "label": "Le moratoire 7 jours (nouveaux plans/skills) décrété au rapport W3 — tenu ?", "options": [{"label": "Cassé de ma propre initiative (ou celle d'un agent non ordonnée)", "score": 0}, {"label": "Cassé uniquement sur mes ordres A+ explicites", "score": 7}, {"label": "Tenu strict — zéro création, exécution de l'existant seulement", "score": 10}]}, {"id": "q7", "zone": "meta", "type": "slider", "max": 10, "label": "Sur les 15 GOs ouverts mesurés dans tes plans, combien fermés (ratifiés OU tués) cette semaine ?"}, {"id": "q8", "zone": "cadence", "type": "radio", "label": "LE cron du move #2 de W3 (un seul, Posture C) — état ?", "options": [{"label": "Toujours 15 crons paused, aucun choisi", "score": 0}, {"label": "Choisi mais pas réactivé", "score": 5}, {"label": "Vivant et vérifié (a tourné au moins 2 fois)", "score": 10}]}, {"id": "q9", "zone": "cadence", "type": "slider", "max": 12, "label": "Items 12WY avec une Definition of Done claire, sur 12 (W3 : 3/12) :"}, {"id": "avoid", "zone": null, "type": "text", "label": "CE QUE TU ÉVITES cette semaine — tes mots. (W3 : le Takeout. Il est traité. Quoi maintenant ?)"}, {"id": "focus", "zone": null, "type": "text", "label": "FOCUS de la semaine — tes mots. (W3 : Auto Evolution du Coach AI du Self Operating Business)"}, {"id": "blunt", "zone": null, "type": "slider", "max": 10, "label": "Franchise du rapport (≥7 = la version qu'un coach dirait à quelqu'un qu'il ne reverra jamais) :"}]};
const form = document.getElementById('form');
CFG.questions.forEach(q => {
  const d = document.createElement('div'); d.className = 'q'; d.id = 'box_' + q.id;
  let h = q.zone ? `<span class="zone-tag">${CFG.zones[q.zone]}</span>` : '';
  h += `<label class="main">${q.label}</label>`;
  if (q.type === 'slider') {
    const max = q.max || 10;
    h += `<input type="range" id="${q.id}" min="0" max="${max}" value="${Math.floor(max/2)}"
           oninput="document.getElementById('v_${q.id}').textContent=this.value">
          <div>Valeur : <span class="sval" id="v_${q.id}">${Math.floor(max/2)}</span> / ${max}</div>`;
  } else if (q.type === 'radio') {
    q.options.forEach((o, i) => {
      h += `<label class="opt"><input type="radio" name="${q.id}" value="${o.score}"
            ${i === 0 ? 'checked' : ''}>${o.label}</label>`;
    });
  } else {
    h += `<textarea id="${q.id}" placeholder="Tes mots, pas les miens."></textarea>`;
  }
  d.innerHTML = h; form.appendChild(d);
});
function val(q) {
  if (q.type === 'slider') {
    const raw = +document.getElementById(q.id).value, max = q.max || 10;
    let s = raw / max * 10; if (q.invert) s = 10 - s; return s;
  }
  if (q.type === 'radio') {
    const c = document.querySelector(`input[name="${q.id}"]:checked`);
    return c ? +c.value : 0;
  }
  return document.getElementById(q.id).value.trim();
}
function genReport() {
  const zoneScores = {}, zoneCounts = {};
  let texts = {};
  CFG.questions.forEach(q => {
    const v = val(q);
    if (q.type === 'text') { texts[q.id] = v; return; }
    if (!q.zone) { texts[q.id] = v; return; }
    zoneScores[q.zone] = (zoneScores[q.zone] || 0) + v;
    zoneCounts[q.zone] = (zoneCounts[q.zone] || 0) + 1;
  });
  const finals = Object.keys(CFG.zones).map(z => ({
    z, name: CFG.zones[z],
    score: zoneCounts[z] ? Math.round(zoneScores[z] / zoneCounts[z]) : null
  })).filter(x => x.score !== null).sort((a, b) => b.score - a.score);
  const weakest = finals[finals.length - 1];
  const blunt = +(texts['blunt'] ?? 5) >= 7;
  let r = `═══ RAPPORT STRATEGY SESSION — W4 (2026-07-07) ═══\n\nSCORES PAR ZONE\n`;
  finals.forEach(f => r += `  ${f.name} : ${f.score}/10\n`);
  r += `\n🔴 ZONE LA PLUS FAIBLE : ${weakest.name.toUpperCase()} (${weakest.score}/10)\n`;
  if (blunt && CFG.blunt_lines[weakest.z]) r += `\nLa vérité en face : ${CFG.blunt_lines[weakest.z]}\n`;
  if (texts['avoid']) r += `\nCE QUE TU ÉVITES (tes mots) : ${texts['avoid']}\n`;
  if (texts['focus']) r += `FOCUS (tes mots) : ${texts['focus']}\n`;
  r += `\nLES 3 MOUVEMENTS DE LA SEMAINE (par impact)\n`;
  (CFG.moves[weakest.z] || []).forEach((m, i) => r += `${i + 1}. ${m}\n`);
  r += `\n─────\nRe-réponds lundi prochain. La zone faible du rapport = le focus de ta semaine.`;
  const el = document.getElementById('report');
  el.textContent = r; el.style.display = 'block'; el.scrollIntoView({behavior: 'smooth'});
}
function copyReport() {
  const el = document.getElementById('report');
  if (el.textContent) navigator.clipboard.writeText(el.textContent);
}
</script></div></body></html>

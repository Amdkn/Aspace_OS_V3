services:
  db:
    image: postgres:15-alpine
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
      POSTGRES_USER: ${POSTGRES_USER:-wikijs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    logging:
      driver: "none"
    restart: unless-stopped
    volumes:
      - wikijs-db-data:/var/lib/postgresql/data

  wiki:
    image: ghcr.io/requarks/wiki:2
    depends_on:
      - db
    init: true
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-wikijs}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-wiki}
    restart: unless-stopped
    ports:
      - "${WIKI_PORT:-3080}:3000"
    volumes:
      - ../import/llm-wiki:/wiki/import/llm-wiki:ro

volumes:
  wikijs-db-data:

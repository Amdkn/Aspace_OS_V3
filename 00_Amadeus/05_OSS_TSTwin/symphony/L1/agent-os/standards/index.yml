## Schema observabilité

`schema-pulse-log-l1.md` — 14 champs (repris de L2) + 4 champs L1-specific :
- `vessel_id` (string|null) — Orville | Discovery | SNW | Enterprise | Cerritos | Protostar
- `crew_id` (string|null) — identifiant crew A3 (Boimler, Tendi, Tilly, etc.)
- `ld_id` (string|null) — LD01..LD08 (life domain impacté)
- `agent_state` (string|null) — Beth 5-state (GREEN/ORANGE/RED/HALT_LD03/HALT_LD04)

## Mapping tick ↔ Life OS

| Phase Symphony | Phase Life OS (rhum matinale) | Crews A3 typiques |
|---|---|---|
| WAKE | Morning brief | Beth (A1) check 5 états |
| PROBE | Clarify incoming | Boimler (Cerritos) triage 2-min |
| DECIDE | Route to vessel | A2 captain du vaisseau |
| EXECUTE | Engage crew | Crews A3 du vaisseau routé |
| OBSERVE | Reflect | Tilly (LD04) + Culber (LD03) si santé |
| LEARN | Weekly review | 12WY captain (SNW) |
| SIGNAL | Report to Beth | A1 Beth update |
| SLEEP | Evening close | A0 Amadeus check |

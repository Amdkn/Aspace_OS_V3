# Agent OS — Standards Index (L1 Life OS)

> 11 standards discoverées depuis le canon Life OS + le runtime Shadow L1.
> Couverture : gouvernance A1/A2/A3 (4 standards) + 4 trackers SoR (4 standards) +
> interop Symphony (3 standards). Distinct du package L2 (workflow d'exécution).

## Gouvernance agents (4)

| # | Standard | Phase Symphony qui l'invoque | Périmètre |
|---|---|---|---|
| 01 | `agent-hierarchy-contract.md` | WAKE + SIGNAL | A0/A1/A2/A3 interfaces, hand-offs, escalation |
| 02 | `beth-5-states-machine.md` | WAKE + OBSERVE + SIGNAL | A1 Beth (5 états) + Morty (intake shadow) |
| 03 | `vessel-captain-protocol.md` | DECIDE + EXECUTE | A2 captain par vaisseau (6 ships) |
| 04 | `crew-bridge-protocol.md` | EXECUTE + OBSERVE | A3 crew par framework (Pillars/Domaines/12WY/PARA/GTD/DEAL) |

